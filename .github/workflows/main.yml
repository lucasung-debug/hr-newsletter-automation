name: Weekly HR Strategic Intelligence

on:
  schedule:
    # 매주 수요일 뉴스레터: UTC 화요일 23:00 = KST 수요일 08:00
    # GitHub Actions 지연(1~2시간) 보정 → 실제 KST 수요일 09:00~10:00 도착
    - cron: '0 23 * * 2'

    # 토요일 회사소식 요청 메일: UTC 21:00 금 = KST 06:00 토 (유지)
    - cron: '0 21 * * 5'

  workflow_dispatch:
    inputs:
      mode:
        description: 'newsletter (기본) 또는 weekend_request'
        required: false
        default: 'newsletter'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          # 요일에 따라 자동 모드 선택: 토요일(6)이면 weekend_request, 아니면 newsletter
          # workflow_dispatch 수동 실행 시 입력값 우선
          BOT_MODE: ${{ github.event.inputs.mode || '' }}
          GEMINI_DEEP_MODEL: gemini-3-flash-preview
        run: |
          if [ -z "$BOT_MODE" ]; then
            DOW=$(date -u +%u)
            if [ "$DOW" = "6" ]; then
              export BOT_MODE="weekend_request"
            else
              export BOT_MODE="newsletter"
            fi
          fi
          echo "BOT_MODE=$BOT_MODE"
          python newsletter_bot.py

      - name: Commit report archive
        if: always()
        run: |
          git config user.name "HR Brief Bot"
          git config user.email "proposition97@gmail.com"
          git add data/reports/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "report: $(date -u +%Y-%m-%d) weekly intelligence"
          git push origin ${{ github.ref_name }} || true
